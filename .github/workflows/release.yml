name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify the wheel installs and registers its metadata
        run: |
          python -m venv /tmp/v
          # Meta-package: members are not on PyPI until their own releases land, so install
          # the wheel without dependencies and confirm its metadata is registered.
          /tmp/v/bin/pip install --no-deps dist/*.whl
          /tmp/v/bin/python -c "import importlib.metadata as m; print('build-ecosystem', m.version('build-ecosystem'))"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment: pypi
    permissions:
      id-token: write   # trusted publishing (OIDC); no API token stored
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
